version: "3.9"

networks:
  mycelium-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  postgres_data:
  redis_data:
  sandbox_workspace:
  genome_store:

services:
  # ─── INFRASTRUCTURE ───────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: mycelium-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mycelium}
      POSTGRES_USER: ${POSTGRES_USER:-mycelium}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mycelium_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - mycelium-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mycelium} -d ${POSTGRES_DB:-mycelium}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: mycelium-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - mycelium-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ─── BACKEND API ──────────────────────────────────────────────────────────────

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: mycelium-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-mycelium}:${POSTGRES_PASSWORD:-mycelium_secret}@postgres:5432/${POSTGRES_DB:-mycelium}
      - REDIS_URL=redis://redis:6379/0
      - REDIS_QUEUE_URL=redis://redis:6379/1
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
      - SANDBOX_NETWORK=mycelium-sandbox-net
      - WORKER_CONCURRENCY=${WORKER_CONCURRENCY:-4}
      - MUTATION_RATE=${MUTATION_RATE:-0.15}
      - MAX_GENOME_SIZE_KB=${MAX_GENOME_SIZE_KB:-512}
      - EVOLUTION_CYCLE_INTERVAL_SEC=${EVOLUTION_CYCLE_INTERVAL_SEC:-30}
    volumes:
      - ./backend:/app
      - /var/run/docker.sock:/var/run/docker.sock
      - sandbox_workspace:/sandbox
      - genome_store:/genomes
    ports:
      - "8000:8000"
    networks:
      - mycelium-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --log-level debug

  # ─── EVOLUTION WORKER ─────────────────────────────────────────────────────────

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
      target: development
    container_name: mycelium-worker
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-mycelium}:${POSTGRES_PASSWORD:-mycelium_secret}@postgres:5432/${POSTGRES_DB:-mycelium}
      - REDIS_URL=redis://redis:6379/0
      - REDIS_QUEUE_URL=redis://redis:6379/1
      - BACKEND_URL=http://backend:8000
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
      - WORKER_ID=${WORKER_ID:-worker-01}
      - WORKER_CONCURRENCY=${WORKER_CONCURRENCY:-4}
      - SANDBOX_CPU_QUOTA=${SANDBOX_CPU_QUOTA:-50000}
      - SANDBOX_MEM_LIMIT=${SANDBOX_MEM_LIMIT:-256m}
      - SANDBOX_TIMEOUT_SEC=${SANDBOX_TIMEOUT_SEC:-30}
    volumes:
      - ./worker:/app
      - /var/run/docker.sock:/var/run/docker.sock
      - sandbox_workspace:/sandbox
      - genome_store:/genomes
    networks:
      - mycelium-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    command: python -m src.main

  # ─── FRONTEND ─────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: mycelium-frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-ws://localhost:8000}
      - NEXT_PUBLIC_ENVIRONMENT=${ENVIRONMENT:-development}
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    networks:
      - mycelium-net
    depends_on:
      - backend
    command: npm run dev

  # ─── NGINX GATEWAY ────────────────────────────────────────────────────────────

  nginx:
    image: nginx:1.25-alpine
    container_name: mycelium-nginx
    restart: unless-stopped
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
    ports:
      - "80:80"
    networks:
      - mycelium-net
    depends_on:
      - backend
      - frontend
    profiles:
      - production
